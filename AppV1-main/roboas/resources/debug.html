<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBOAS | DEBUG HUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --purple: #7000ff;
            --purple-glow: rgba(112, 0, 255, 0.3);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #e0e0e0;
            --text-dim: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 20%, var(--purple-glow) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, var(--accent-glow) 0%, transparent 40%);
        }

        .hud-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            grid-template-rows: 80px 1fr;
            gap: 20px;
            padding: 20px;
            height: 100vh;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* --- Header --- */
        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--accent), var(--purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* --- Sidebar (System Info) --- */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
        }

        .card-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .persona-card {
            text-align: center;
        }

        .persona-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--glass-border);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transition: all 0.5s ease;
        }

        .persona-linda .persona-avatar {
            border-color: var(--purple);
            box-shadow: 0 0 20px var(--purple-glow);
        }

        .persona-name {
            font-size: 1.5rem;
            text-transform: capitalize;
            letter-spacing: 1px;
        }

        /* --- Main Feed --- */
        .main-feed {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .feed-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .feed-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-family: 'JetBrains Mono', monospace;
        }

        .feed-content::-webkit-scrollbar {
            width: 6px;
        }

        .feed-content::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 3px;
        }

        .log-entry {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease-out;
            transition: transform 0.2s;
        }

        .log-entry:hover {
            transform: scale(1.005);
            background: rgba(255, 255, 255, 0.04);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 8px;
            color: var(--text-dim);
        }

        .log-tool {
            color: var(--accent);
            font-weight: 700;
        }

        .log-question {
            font-size: 0.9rem;
            color: var(--text-main);
            margin-bottom: 10px;
            font-style: italic;
        }

        .log-details {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 10px;
            font-size: 0.8rem;
        }

        .label {
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .value {
            color: var(--accent);
            word-break: break-all;
        }

        .result {
            color: #ff9d00;
        }

        /* --- Footer Info --- */
        .analytics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .mini-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="hud-container">
        <header>
            <div class="logo">Roboas Control</div>
            <div class="status-badge">
                <div class="dot"></div>
                SYSTEM ACTIVE
            </div>
        </header>

        <aside class="sidebar">
            <div class="card persona-card" id="persona-container">
                <div class="card-title">Current Persona</div>
                <div class="persona-avatar" id="persona-icon">🤖</div>
                <div class="persona-name" id="persona-name">Syncing...</div>
            </div>

            <div class="card">
                <div class="card-title">Activity Metrics</div>
                <div class="analytics">
                    <div class="mini-card">
                        <div class="card-title">Tool Calls</div>
                        <div class="card-value" id="total-calls">0</div>
                    </div>
                    <div class="mini-card">
                        <div class="card-title">Latency</div>
                        <div class="card-value" style="font-size: 1.2rem; color: #00ff88;">Nominal</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Connection Status</div>
                <div style="font-size: 0.9rem; margin-bottom: 5px;">Server: <span style="color: var(--accent)">Online</span></div>
                <div style="font-size: 0.9rem;">Port: <span style="color: var(--accent)">3000</span></div>
            </div>
        </aside>

        <main class="main-feed">
            <div class="feed-header">
                <h3 style="font-size: 1rem; color: var(--text-main); opacity: 0.7;">MCP TOOL FEED</h3>
                <span id="update-ts" style="font-size: 0.7rem; color: var(--text-dim);">LAST UPDATE: JUST NOW</span>
            </div>
            <div class="feed-content" id="log-feed">
                <!-- Logs will be injected here -->
                <div style="padding: 40px; text-align: center; color: var(--text-dim);">Initializing data stream...</div>
            </div>
        </main>
    </div>

    <script>
        let lastLogSize = -1;

        async function fetchLogs() {
            try {
                const response = await fetch('/tool-log');
                const data = await response.json();
                
                if (data.success) {
                    updateUI(data);
                }
            } catch (err) {
                console.error("HUD Sync Error:", err);
            }
        }

        function updateUI(data) {
            // Update Persona
            const nameEl = document.getElementById('persona-name');
            const iconEl = document.getElementById('persona-icon');
            const container = document.getElementById('persona-container');

            nameEl.innerText = data.currentPersona;
            iconEl.innerText = data.currentPersona === 'linda' ? '👩' : '👨';
            
            if (data.currentPersona === 'linda') {
                container.classList.add('persona-linda');
                iconEl.style.borderColor = '#7000ff';
                iconEl.style.boxShadow = '0 0 20px rgba(112, 0, 255, 0.3)';
            } else {
                container.classList.remove('persona-linda');
                iconEl.style.borderColor = '#00f2ff';
                iconEl.style.boxShadow = '0 0 20px rgba(0, 242, 255, 0.3)';
            }

            // Update Metrics
            document.getElementById('total-calls').innerText = data.totalCalls;
            const now = new Date();
            const sgTime = now.toLocaleTimeString('en-SG', { timeZone: 'Asia/Singapore', hour12: true });
            document.getElementById('update-ts').innerText = `LAST UPDATE (SGT): ${sgTime}`;

            // Update Feed if size changed
            if (data.log.length !== lastLogSize) {
                const feed = document.getElementById('log-feed');
                
                // Get most recent at top
                const logs = [...data.log].reverse();
                
                feed.innerHTML = logs.map(log => `
                    <div class="log-entry">
                        <div class="log-meta">
                            <span class="log-tool">${log.toolName.toUpperCase()}</span>
                            <span>${new Date(log.timestamp).toLocaleTimeString('en-SG', { timeZone: 'Asia/Singapore', hour12: true })}</span>
                        </div>
                        <div class="log-question">"${log.userQuestion}"</div>
                        <div class="log-details">
                            <div class="label">Args:</div>
                            <div class="value">${JSON.stringify(log.args)}</div>
                            <div class="label">Status:</div>
                            <div class="value result">${log.result}</div>
                        </div>
                    </div>
                `).join('');

                lastLogSize = data.log.length;
            }
        }

        // Start Polling
        fetchLogs();
        setInterval(fetchLogs, 2000);
    </script>
</body>
</html>
