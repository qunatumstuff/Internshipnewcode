<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBOAS | DEBUG HUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --purple: #7000ff;
            --purple-glow: rgba(112, 0, 255, 0.3);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #e0e0e0;
            --text-dim: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 20%, var(--purple-glow) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, var(--accent-glow) 0%, transparent 40%);
        }

        .hud-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            grid-template-rows: 80px 1fr;
            gap: 20px;
            padding: 20px;
            height: 100vh;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* --- Header --- */
        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--accent), var(--purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* --- Sidebar (System Info) --- */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
        }

        .card-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .persona-card {
            text-align: center;
        }

        .persona-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--glass-border);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transition: all 0.5s ease;
        }

        .persona-linda .persona-avatar {
            border-color: var(--purple);
            box-shadow: 0 0 20px var(--purple-glow);
        }

        .persona-name {
            font-size: 1.5rem;
            text-transform: capitalize;
            letter-spacing: 1px;
        }

        /* --- Main Feed --- */
        .main-feed {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .feed-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .feed-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-family: 'JetBrains Mono', monospace;
        }

        .feed-content::-webkit-scrollbar {
            width: 6px;
        }

        .feed-content::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 3px;
        }

        .log-entry {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease-out;
            transition: transform 0.2s;
        }

        .log-entry:hover {
            transform: scale(1.005);
            background: rgba(255, 255, 255, 0.04);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 8px;
            color: var(--text-dim);
        }

        .log-tool {
            color: var(--accent);
            font-weight: 700;
        }

        .log-question {
            font-size: 0.9rem;
            color: var(--text-main);
            margin-bottom: 10px;
            font-style: italic;
        }

        .log-details {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 10px;
            font-size: 0.8rem;
        }

        .label {
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .value {
            color: var(--accent);
            word-break: break-all;
        }

        .result {
            color: #ff9d00;
        }

        /* --- Footer Info --- */
        .analytics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .mini-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        /* --- Debug Control Panel --- */
        .debug-control-panel {
            position: fixed;
            bottom: 85px;
            right: 20px;
            width: 330px;
            height: 420px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.85), 0 0 25px rgba(0, 242, 255, 0.15);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
            resize: both;
            overflow: hidden;
            min-width: 280px;
            min-height: 250px;
            max-width: 90vw;
            max-height: 80vh;
        }

        .debug-control-panel.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .panel-header {
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--glass-border);
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-body {
            padding: 15px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel-body::-webkit-scrollbar {
            width: 4px;
        }

        .panel-body::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 2px;
        }

        .panel-btn-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.35rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.4);
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .panel-btn-toggle:hover {
            transform: scale(1.08) rotate(15deg);
            box-shadow: 0 5px 25px rgba(0, 242, 255, 0.6);
        }

        .panel-btn-toggle:active {
            transform: scale(0.92);
        }
        
        .debug-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .debug-btn:hover {
            background: rgba(0, 242, 255, 0.12);
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }
        
        .debug-select, .debug-textarea {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.8rem;
            width: 100%;
        }

        .debug-textarea {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
        }
        
        .debug-select:focus, .debug-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
        }
        
        .debug-form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .debug-form-group label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
        <div class="hud-container">
        <header>
            <div class="logo">Roboas Control</div>
            <div class="status-badge">
                <div class="dot"></div>
                SYSTEM ACTIVE
            </div>
        </header>

        <aside class="sidebar">
            <div class="card persona-card" id="persona-container">
                <div class="card-title">Current Persona</div>
                <div class="persona-avatar" id="persona-icon">🤖</div>
                <div class="persona-name" id="persona-name">Syncing...</div>
            </div>

            <div class="card">
                <div class="card-title">Activity Metrics</div>
                <div class="analytics">
                    <div class="mini-card">
                        <div class="card-title">Tool Calls</div>
                        <div class="card-value" id="total-calls">0</div>
                    </div>
                    <div class="mini-card">
                        <div class="card-title">Latency</div>
                        <div class="card-value" style="font-size: 1.2rem; color: #00ff88;">Nominal</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Connection Status</div>
                <div style="font-size: 0.95rem; margin-bottom: 10px;">Server: <span style="color: #00ff88; font-weight: 600;">Online</span> (Port 3000)</div>
                <div style="font-size: 0.85rem; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center;">
                    <span>Emoji MCP:</span>
                    <span id="status-emoji" style="padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; background: rgba(255,0,0,0.1); color: #ff4444;">Offline</span>
                </div>
                <div style="font-size: 0.85rem; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center;">
                    <span>Vision MCP:</span>
                    <span id="status-vision" style="padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; background: rgba(255,0,0,0.1); color: #ff4444;">Offline</span>
                </div>
                <div style="font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center;">
                    <span>Robot MCP:</span>
                    <span id="status-robot" style="padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; background: rgba(255,0,0,0.1); color: #ff4444;">Offline</span>
                </div>
            </div>
        </aside>

        <main class="main-feed">
            <div class="feed-header">
                <h3 style="font-size: 1rem; color: var(--text-main); opacity: 0.7;">MCP TOOL FEED</h3>
                <span id="update-ts" style="font-size: 0.7rem; color: var(--text-dim);">LAST UPDATE: JUST NOW</span>
            </div>
            <div class="feed-content" id="log-feed">
                <!-- Logs will be injected here -->
                <div style="padding: 40px; text-align: center; color: var(--text-dim);">Initializing data stream...</div>
            </div>
        </main>
    </div>

    <script>
        let lastLogSize = -1;

        async function fetchLogs() {
            try {
                const response = await fetch('/tool-log');
                const data = await response.json();
                
                if (data.success) {
                    updateUI(data);
                }
            } catch (err) {
                console.error("HUD Sync Error:", err);
            }
        }

        function updateUI(data) {
            // Update Persona
            const nameEl = document.getElementById('persona-name');
            const iconEl = document.getElementById('persona-icon');
            const container = document.getElementById('persona-container');

            nameEl.innerText = data.currentPersona;
            iconEl.innerText = data.currentPersona === 'linda' ? '👩' : '👨';
            
            if (data.currentPersona === 'linda') {
                container.classList.add('persona-linda');
                iconEl.style.borderColor = '#7000ff';
                iconEl.style.boxShadow = '0 0 20px rgba(112, 0, 255, 0.3)';
            } else {
                container.classList.remove('persona-linda');
                iconEl.style.borderColor = '#00f2ff';
                iconEl.style.boxShadow = '0 0 20px rgba(0, 242, 255, 0.3)';
            }

            // Update Connection Badges
            if (data.mcpStatus) {
                updateBadge('status-emoji', data.mcpStatus.emoji);
                updateBadge('status-vision', data.mcpStatus.vision);
                updateBadge('status-robot', data.mcpStatus.robot);
            }

            // Update Metrics
            document.getElementById('total-calls').innerText = data.totalCalls;
            const now = new Date();
            const sgTime = now.toLocaleTimeString('en-SG', { timeZone: 'Asia/Singapore', hour12: true });
            document.getElementById('update-ts').innerText = `LAST UPDATE (SGT): ${sgTime}`;

            // Update Feed if size changed
            if (data.log.length !== lastLogSize) {
                const feed = document.getElementById('log-feed');
                
                // Get most recent at top
                const logs = [...data.log].reverse();
                
                feed.innerHTML = logs.map(log => `
                    <div class="log-entry">
                        <div class="log-meta">
                            <span class="log-tool">${log.toolName.toUpperCase()}</span>
                            <span>${new Date(log.timestamp).toLocaleTimeString('en-SG', { timeZone: 'Asia/Singapore', hour12: true })}</span>
                        </div>
                        <div class="log-question">"${log.userQuestion}"</div>
                        <div class="log-details">
                            <div class="label">Args:</div>
                            <div class="value">${JSON.stringify(log.args)}</div>
                            <div class="label">Status:</div>
                            <div class="value result">${log.result}</div>
                        </div>
                    </div>
                `).join('');

                lastLogSize = data.log.length;
            }
        }

        // Start Polling
        fetchLogs();
        setInterval(fetchLogs, 2000);

        // --- Debug Control Panel Code ---
        const debugPanel = document.getElementById('debug-panel');
        const toggleBtn = document.getElementById('toggle-panel-btn');
        
        toggleBtn.addEventListener('click', () => {
            const isActive = debugPanel.classList.contains('active');
            togglePanel(!isActive);
        });
        
        function togglePanel(open) {
            if (open) {
                debugPanel.classList.add('active');
                toggleBtn.style.transform = 'rotate(90deg)';
            } else {
                debugPanel.classList.remove('active');
                toggleBtn.style.transform = 'rotate(0deg)';
            }
        }
        
        async function triggerPersona(persona) {
            try {
                const res = await fetch('/switch-persona', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ persona, silent: false })
                });
                const result = await res.json();
                if (result.success) {
                    fetchLogs();
                }
            } catch (err) {
                console.error("Failed to switch persona:", err);
            }
        }
        
        async function clearLogs() {
            if (!confirm("Are you sure you want to clear the logs?")) return;
            try {
                const res = await fetch('/debug/clear-logs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const result = await res.json();
                if (result.success) {
                    fetchLogs();
                }
            } catch (err) {
                console.error("Failed to clear logs:", err);
            }
        }
        
        const placeholders = {
            locate_object: '{\n  "target_name": "cube",\n  "x": -0.1009,\n  "y": -0.1316,\n  "z": 0.9670\n}',
            pick_and_place_object: '{\n  "object_name": "cube",\n  "x": 0.285,\n  "y": -0.120,\n  "z": 0.050,\n  "angle_deg": 45\n}',
            relocate_object: '{\n  "obstacle_name": "medicine",\n  "obstacle_x": 0.310,\n  "obstacle_y": -0.050,\n  "obstacle_z": 0.020\n}'
        };
        
        function updateMockArgsPlaceholder() {
            const select = document.getElementById('mock-tool-select');
            const textarea = document.getElementById('mock-args-input');
            textarea.value = placeholders[select.value] || '{}';
        }
        
        updateMockArgsPlaceholder();
        
        async function submitMockTool() {
            const select = document.getElementById('mock-tool-select');
            const textarea = document.getElementById('mock-args-input');
            
            let args = {};
            try {
                args = JSON.parse(textarea.value);
            } catch (err) {
                alert("Arguments must be a valid JSON object");
                return;
            }
            
            try {
                const res = await fetch('/debug/trigger-mock-tool', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ toolName: select.value, args })
                });
                const result = await res.json();
                if (result.success) {
                    alert("Mock executed successfully! Log recorded in feed.");
                    fetchLogs();
                } else {
                    alert("Error: " + result.message);
                }
            } catch (err) {
                console.error("Mock Execution Error:", err);
                alert("Execution Failed: " + err.message);
            }
        }

        function updateBadge(elementId, isConnected) {
            const el = document.getElementById(elementId);
            if (!el) return;
            if (isConnected) {
                el.innerText = 'Online';
                el.style.background = 'rgba(0, 255, 136, 0.1)';
                el.style.color = '#00ff88';
            } else {
                el.innerText = 'Offline';
                el.style.background = 'rgba(255, 68, 68, 0.1)';
                el.style.color = '#ff4444';
            }
        }
    </script>
    
    <!-- Floating Control Panel Toggle Button -->
    <button class="panel-btn-toggle" id="toggle-panel-btn" title="Toggle Debug Panel">🔧</button>

    <!-- Collapsible Control Panel -->
    <div class="debug-control-panel" id="debug-panel">
        <div class="panel-header">
            <span>Interactive Controls</span>
            <button class="debug-btn" style="padding: 2px 6px; font-size: 0.75rem;" onclick="togglePanel(false)">✕</button>
        </div>
        <div class="panel-body">
            <div class="debug-form-group">
                <label>Quick Actions</label>
                <div style="display: flex; gap: 8px;">
                    <button class="debug-btn" style="flex: 1;" onclick="triggerPersona('john')">John 👨</button>
                    <button class="debug-btn" style="flex: 1;" onclick="triggerPersona('linda')">Linda 👩</button>
                </div>
                <button class="debug-btn" style="margin-top: 8px; border-color: rgba(255, 68, 68, 0.4);" onclick="clearLogs()">Clear Tool Logs 🗑️</button>
            </div>
            
            <hr style="border: 0; border-top: 1px solid var(--glass-border);">
            
            <div class="debug-form-group">
                <label>Mock Tool Trigger</label>
                <select class="debug-select" id="mock-tool-select" onchange="updateMockArgsPlaceholder()">
                    <option value="locate_object">locate_object</option>
                    <option value="pick_and_place_object">pick_and_place_object</option>
                    <option value="relocate_object">relocate_object</option>
                </select>
            </div>
            
            <div class="debug-form-group">
                <label>Arguments (JSON)</label>
                <textarea class="debug-textarea" id="mock-args-input" rows="4"></textarea>
            </div>
            
            <button class="debug-btn" style="background: linear-gradient(135deg, var(--accent), var(--purple)); border: none; color: white;" onclick="submitMockTool()">Execute Mock Call ⚡</button>
        </div>
    </div>
</body>
</html>
