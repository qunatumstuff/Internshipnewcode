<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>openWakeWord-JS Proof of Concept</title>
  <!-- Load ONNX Runtime Web directly in the browser -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
  <style>
    :root {
      --bg-color: #0d0e15;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent-color: #00e676;
      --error-color: #ff1744;
      --text-color: #f1f1f1;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 30px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
      color: #fff;
      font-weight: 700;
      background: linear-gradient(45deg, #00e676, #00b0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: #aaa;
      font-size: 14px;
      line-height: 1.5;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      background-color: rgba(255, 255, 255, 0.1);
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .status-badge.connected {
      color: var(--accent-color);
      background-color: rgba(0, 230, 118, 0.15);
      border: 1px solid rgba(0, 230, 118, 0.3);
    }

    .status-badge.error {
      color: var(--error-color);
      background-color: rgba(255, 23, 68, 0.15);
      border: 1px solid rgba(255, 23, 68, 0.3);
    }

    .btn {
      background: linear-gradient(135deg, #00e676 0%, #00b0ff 100%);
      border: none;
      color: white;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 230, 118, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 230, 118, 0.6);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn:disabled {
      background: #424242;
      box-shadow: none;
      cursor: not-allowed;
    }

    .log-panel {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 15px;
      height: 200px;
      overflow-y: auto;
      text-align: left;
      font-family: monospace;
      font-size: 12px;
      color: #00e676;
      margin-top: 20px;
      box-sizing: border-box;
    }

    .log-entry {
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .log-entry.info {
      color: #00b0ff;
    }

    .log-entry.warn {
      color: #ffea00;
    }

    .log-entry.error {
      color: var(--error-color);
    }

    .log-entry.detection {
      color: #ff00ff;
      font-weight: bold;
      font-size: 14px;
      border: 1px dashed #ff00ff;
      padding: 4px;
      border-radius: 4px;
      background: rgba(255, 0, 255, 0.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>openWakeWord-JS PoC</h1>
    <p>Verify microphone access, ONNX Runtime loading, and wake-word detection in the browser.</p>
    
    <div id="statusBadge" class="status-badge">Ready to Start</div>
    <div id="loadedModelsDisplay" style="font-size: 13px; color: #888; margin-top: 10px; margin-bottom: 20px; font-weight: 500;">Active models: None loaded</div>
    
    <!-- Wakeword Model Selection UI -->
    <div class="keyword-selector" style="margin: 20px auto; text-align: left; background: rgba(255,255,255,0.03); padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); max-width: 400px; box-sizing: border-box;">
      <div style="font-weight: bold; margin-bottom: 12px; color: #fff; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px;">Select Wakewords to Load:</div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; font-size: 13px;">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: #00e676; font-weight: 500;">
          <input type="checkbox" id="kw_john" value="john" checked style="cursor: pointer;"> john.onnx
        </label>
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: #00e676; font-weight: 500;">
          <input type="checkbox" id="kw_linda" value="linda" checked style="cursor: pointer;"> linda.onnx
        </label>
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: #00e676; font-weight: 500;">
          <input type="checkbox" id="kw_jarvis" value="hey_jarvis" checked style="cursor: pointer;"> hey_jarvis.onnx
        </label>
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: #00e676; font-weight: 500;">
          <input type="checkbox" id="kw_alexa" value="alexa" checked style="cursor: pointer;"> alexa.onnx
        </label>
      </div>
    </div>
    
    <button id="startBtn" class="btn">Start Audio & Engine</button>
    
    <div id="logPanel" class="log-panel">
      <div class="log-entry info">Click the button above to begin.</div>
    </div>
  </div>

  <script type="module">
    // Load the local browser-compatible WakeWordEngine module
    import { WakeWordEngine } from './WakeWordEngine.js';

    const startBtn = document.getElementById('startBtn');
    const statusBadge = document.getElementById('statusBadge');
    const logPanel = document.getElementById('logPanel');

    function log(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.innerText = `[${new Date().toLocaleTimeString()}] ${message}`;
      logPanel.appendChild(entry);
      logPanel.scrollTop = logPanel.scrollHeight;
      console.log(`[POC] ${message}`);
    }

    async function initEngine() {
      startBtn.disabled = true;
      statusBadge.innerText = 'Initializing...';
      statusBadge.className = 'status-badge';
      
      log('Initializing openWakeWord engine...', 'info');

      // 1. Verify Microphone Access permission request
      try {
        log('Requesting browser microphone access via getUserMedia...', 'info');
        const testStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        // Close test stream immediately
        testStream.getTracks().forEach(t => t.stop());
        log('✅ Microphone permission GRANTED.', 'info');
      } catch (err) {
        log(`❌ Microphone access DENIED or error: ${err.message}`, 'error');
        statusBadge.innerText = 'Mic Access Error';
        statusBadge.className = 'status-badge error';
        startBtn.disabled = false;
        return;
      }

      // 2. Initialize the WakeWordEngine
      // Models are served statically in '/models' folder on the backend
      const baseAssetUrl = '/models'; 
      log(`Setting baseAssetUrl to: ${baseAssetUrl}`, 'info');

      // Configure WASM paths
      if (window.ort) {
        window.ort.env.wasm.wasmPaths = '/ort/';
        log('Set ort.env.wasm.wasmPaths to /ort/', 'info');
      }

      // Resolve checked keywords from UI checkboxes
      const checkedKeywords = [];
      if (document.getElementById('kw_john').checked) checkedKeywords.push('john');
      if (document.getElementById('kw_linda').checked) checkedKeywords.push('linda');
      if (document.getElementById('kw_jarvis').checked) checkedKeywords.push('hey_jarvis');
      if (document.getElementById('kw_alexa').checked) checkedKeywords.push('alexa');

      if (checkedKeywords.length === 0) {
        log('❌ Please select at least one wakeword to load.', 'error');
        statusBadge.innerText = 'Select Wakeword';
        statusBadge.className = 'status-badge error';
        startBtn.disabled = false;
        return;
      }

      log(`Loading engine with keywords: ${checkedKeywords.join(', ')}`, 'info');

      const engine = new WakeWordEngine({
        baseAssetUrl: baseAssetUrl,
        keywords: checkedKeywords,
        detectionThreshold: 0.45,
        cooldownMs: 2500,
        ortWasmPath: '/ort/',
        debug: true
      });

      // 3. Load ONNX Models (melspectrogram.onnx, embedding_model.onnx, etc.)
      try {
        log('Loading ONNX models (melspectrogram, embedding_model, keyword models)...', 'info');
        await engine.load();
        log('✅ ONNX Models loaded successfully.', 'info');
        document.getElementById('loadedModelsDisplay').innerText = `Active models: ${checkedKeywords.join(', ')}`;
        document.getElementById('loadedModelsDisplay').style.color = '#00e676';
      } catch (err) {
        log(`❌ Failed to load ONNX models: ${err.message}`, 'error');
        statusBadge.innerText = 'Model Load Error';
        statusBadge.className = 'status-badge error';
        startBtn.disabled = false;
        return;
      }

      // 4. Attach Event Callbacks
      engine.on('ready', () => {
        log('🎉 WakeWordEngine reports READY.', 'info');
      });

      engine.on('detect', ({ keyword, score }) => {
        if (keyword === 'john') {
          log(`[OWW] John detected (score: ${score.toFixed(4)})`, 'detection');
        } else if (keyword === 'linda') {
          log(`[OWW] Linda detected (score: ${score.toFixed(4)})`, 'detection');
        } else {
          log(`🎯 DETECTED WAKEWORD: "${keyword}" with score ${score.toFixed(4)}!`, 'detection');
        }
        
        // Blink status badge to show visual response
        statusBadge.innerText = `Detected: ${keyword.toUpperCase()}`;
        statusBadge.className = 'status-badge connected';
        setTimeout(() => {
          if (statusBadge.innerText.startsWith('Detected:')) {
            statusBadge.innerText = 'Listening...';
          }
        }, 3000);
      });

      // 5. Start Engine processing mic audio
      try {
        log('Starting microphone audio capture loop...', 'info');
        await engine.start();
        log(`🔊 WakeWordEngine started. Listening for custom models (${checkedKeywords.join(', ')})...`, 'info');
        statusBadge.innerText = 'Listening...';
        statusBadge.className = 'status-badge connected';
      } catch (err) {
        log(`❌ Engine failed to start: ${err.message}`, 'error');
        statusBadge.innerText = 'Start Error';
        statusBadge.className = 'status-badge error';
        startBtn.disabled = false;
      }
    }

    startBtn.addEventListener('click', initEngine);
  </script>
</body>
</html>
